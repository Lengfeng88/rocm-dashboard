name: Weekly ROCm Report

on:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:

jobs:
  update-dashboard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install openai python-dotenv

      - name: Generate AI weekly summary
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          python - << 'PYEOF'
          import os, json
          from datetime import datetime
          from openai import OpenAI

          client = OpenAI(
              api_key=os.environ["DEEPSEEK_API_KEY"],
              base_url="https://api.deepseek.com",
          )

          # Hardcoded KPIs from last collection (updated weekly by collector)
          kpis = {
              "generated_at": datetime.now().strftime("%Y-%m-%d %H:%M"),
              "issues": [
                  {"repo":"ROCm/hip","open":7,"closed":940,"avg_resolve_days":556.0},
                  {"repo":"ROCm/MIOpen","open":3,"closed":1077,"avg_resolve_days":392.0},
                  {"repo":"ROCm/rccl","open":0,"closed":138,"avg_resolve_days":83.4},
                  {"repo":"ROCm/rocSPARSE","open":0,"closed":47,"avg_resolve_days":86.0},
                  {"repo":"ROCm/rocFFT","open":0,"closed":109,"avg_resolve_days":199.5},
                  {"repo":"ROCm/rocBLAS","open":0,"closed":172,"avg_resolve_days":138.6},
              ],
              "prs": [
                  {"repo":"ROCm/hip","open":30,"merged":2147,"avg_cycle_days":10.4},
                  {"repo":"ROCm/rccl","open":7,"merged":1661,"avg_cycle_days":7.1},
                  {"repo":"ROCm/MIOpen","open":6,"merged":2242,"avg_cycle_days":12.9},
                  {"repo":"ROCm/rocFFT","open":3,"merged":373,"avg_cycle_days":4.1},
                  {"repo":"ROCm/rocSPARSE","open":1,"merged":392,"avg_cycle_days":3.5},
                  {"repo":"ROCm/rocBLAS","open":0,"merged":1266,"avg_cycle_days":2.2},
              ],
              "ci": [
                  {"repo":"ROCm/hip","total_runs":22,"passed":0,"failed":22,"pass_rate":0.0,"median_min":0.6},
                  {"repo":"ROCm/rccl","total_runs":48,"passed":12,"failed":36,"pass_rate":25.0,"median_min":3.6},
              ],
              "bus_factor": [
                  {"repo":"ROCm/rocSPARSE","top3_pct":84.9},
                  {"repo":"ROCm/rocFFT","top3_pct":53.3},
                  {"repo":"ROCm/rocBLAS","top3_pct":45.4},
                  {"repo":"ROCm/rccl","top3_pct":43.2},
                  {"repo":"ROCm/hip","top3_pct":40.7},
                  {"repo":"ROCm/MIOpen","top3_pct":33.9},
              ],
          }

          response = client.chat.completions.create(
              model="deepseek-chat",
              messages=[
                  {"role":"system","content":"You are a senior AMD engineering program manager. Write concise weekly engineering health reports. Always cite exact numbers. Output Markdown."},
                  {"role":"user","content":f"""Here is this week's KPI data:\n\n{json.dumps(kpis,indent=2)}\n\nWrite a weekly engineering health report with sections:\n## Executive Summary\n## Key Findings\n## Risk Flags 🚨\n## Recommendations\n## Positive Signals ✅\n\nUnder 500 words. Be direct and cite specific numbers."""},
              ],
              max_tokens=800,
              temperature=0.3,
          )

          report = response.choices[0].message.content
          os.makedirs("report/output", exist_ok=True)
          week = datetime.now().strftime("%Y_W%V")
          with open(f"report/output/weekly_{week}.md","w") as f:
              f.write(report)
          print(report)
          print(f"\nSaved to report/output/weekly_{week}.md")
          PYEOF

      - name: Commit report
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add report/output/
          git diff --staged --quiet || git commit -m "chore: weekly report $(date +%Y-%m-%d)"
          git push

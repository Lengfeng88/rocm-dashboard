name: Weekly ROCm Report

on:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:

jobs:
  update-dashboard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install httpx python-dotenv openai sqlalchemy psycopg2-binary

      - name: Collect GitHub data
        env:
          GITHUB_TOKEN:      ${{ secrets.GH_PAT }}
          DATABASE_URL_SYNC: ${{ secrets.DATABASE_URL_SYNC }}
          DEEPSEEK_API_KEY:  ${{ secrets.DEEPSEEK_API_KEY }}
        run: python collectors/run_all.py

      - name: Generate AI weekly summary
        env:
          DATABASE_URL_SYNC: ${{ secrets.DATABASE_URL_SYNC }}
          DEEPSEEK_API_KEY:  ${{ secrets.DEEPSEEK_API_KEY }}
        run: python -m ai.weekly_summary --output /tmp/rocm_weekly.md

      - name: Rebuild static dashboard
        env:
          DATABASE_URL_SYNC: ${{ secrets.DATABASE_URL_SYNC }}
        run: python scripts/build_static.py

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "chore: weekly update $(date +%Y-%m-%d)"
          git push

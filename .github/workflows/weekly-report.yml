name: Weekly Engineering Report

on:
  schedule:
    - cron: '0 9 * * 1'   # Every Monday 09:00 UTC
  workflow_dispatch:        # Manual trigger

jobs:
  generate-report:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: rocm_health
          POSTGRES_USER: rocm
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Init database schema
        env:
          PGPASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
        run: psql -h localhost -U rocm -d rocm_health -f db/schema.sql

      - name: Collect GitHub data
        env:
          GITHUB_TOKEN:        ${{ secrets.GH_PAT }}
          DATABASE_URL_SYNC:   postgresql://rocm:${{ secrets.POSTGRES_PASSWORD }}@localhost:5432/rocm_health
          DATABASE_URL:        postgresql+asyncpg://rocm:${{ secrets.POSTGRES_PASSWORD }}@localhost:5432/rocm_health
        run: python -m collectors.run_all

      - name: Generate AI weekly report
        env:
          DEEPSEEK_API_KEY:    ${{ secrets.DEEPSEEK_API_KEY }}
          DATABASE_URL_SYNC:   postgresql://rocm:${{ secrets.POSTGRES_PASSWORD }}@localhost:5432/rocm_health
        run: |
          mkdir -p report/output
          python -m ai.weekly_summary

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: weekly-report-${{ github.run_number }}
          path: report/output/

      - name: Post summary to job
        run: |
          echo "## ROCm Weekly Engineering Report" >> $GITHUB_STEP_SUMMARY
          cat report/output/weekly_*.md >> $GITHUB_STEP_SUMMARY

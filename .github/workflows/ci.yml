name: API Tests

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: rocm_health
          POSTGRES_USER: rocm
          POSTGRES_PASSWORD: testpass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Init schema
        env:
          PGPASSWORD: testpass
        run: psql -h localhost -U rocm -d rocm_health -f db/schema.sql

      - name: Run tests
        env:
          DATABASE_URL_SYNC: postgresql://rocm:testpass@localhost:5432/rocm_health
          DATABASE_URL:      postgresql+asyncpg://rocm:testpass@localhost:5432/rocm_health
          GITHUB_TOKEN:      dummy
          DEEPSEEK_API_KEY:  dummy
        run: pytest tests/ -v --tb=short
